{% extends "base.html" %}

{% block title %}申請請假 - 打工排班最佳化系統{% endblock %}

{% block content %}
<div style="max-width: 650px; margin: 0 auto; padding: 2rem 0;">
    <div style="margin-bottom: 1.5rem;">
        <a href="{{ url_for('main.index') }}" style="color: var(--text-secondary); text-decoration: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 0.5rem;">
            ← 返回儀表板
        </a>
    </div>

    <div class="glass-panel" style="padding: 2.5rem;">
        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(135deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            ✍️ 提出請假申請
        </h2>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem;">
            請填寫請假的起始與結束時間，並送出待店長審核。送出後，系統會自動在審核通過時釋出您已排定的班次。
        </p>

        <form action="{{ url_for('leave.leave_apply') }}" method="POST">
            <div class="form-group">
                <label for="leave_type" class="form-label">假別 (Leave Type) *</label>
                <select id="leave_type" name="leave_type" class="form-control" required>
                    <option value="Personal">事假 (Personal)</option>
                    <option value="Sick">病假 (Sick)</option>
                    <option value="Vacation">特休/年假 (Vacation)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="start_time" class="form-label">請假開始時間 (Start Time) *</label>
                <input type="datetime-local" id="start_time" name="start_time" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="end_time" class="form-label">請假結束時間 (End Time) *</label>
                <input type="datetime-local" id="end_time" name="end_time" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="reason" class="form-label">請假事由與備註 (Reason)</label>
                <textarea id="reason" name="reason" class="form-control" placeholder="請填寫具體原因..." rows="4" style="resize: vertical;"></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">確認送出申請</button>
        </form>
    </div>
</div>
{% endblock %}
